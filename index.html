<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Tool</title>
<style>
  :root {
    --bg: #f7f7f8; --surface: #fff; --surface2: #f0f0f2; --border: #e2e2e6;
    --text: #1a1a1e; --text2: #6b6b76; --text3: #9b9ba5;
    --accent: #2a7de1; --accent-bg: #e6f1fb; --success: #1a8c4e;
    --danger: #d93025; --danger-bg: #fce8e6;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
  .app { display: grid; grid-template-columns: 300px 1fr; grid-template-rows: auto 1fr; height: 100vh; }
  .header { grid-column: 1 / -1; padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .main { overflow: hidden; display: flex; flex-direction: column; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); padding: 14px 16px 6px; display: flex; align-items: center; justify-content: space-between; }
  .clear-all { font-size: 10px; font-weight: 500; color: var(--danger); cursor: pointer; text-transform: none; letter-spacing: 0; }
  .clear-all:hover { text-decoration: underline; }
  .settings { padding: 0 16px 16px; }
  .setting-row { margin-bottom: 12px; }
  .setting-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .setting-label span:last-child { font-weight: 500; color: var(--text); }
  .format-btns { display: flex; gap: 3px; background: var(--surface2); border-radius: var(--radius-sm); padding: 2px; }
  .format-btns button { flex: 1; padding: 5px 0; font-size: 12px; font-weight: 500; border: none; border-radius: 4px; background: transparent; color: var(--text2); cursor: pointer; transition: all .15s; }
  .format-btns button.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  input[type=range] { width: 100%; height: 4px; -webkit-appearance: none; background: var(--border); border-radius: 2px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; user-select: none; padding: 4px 0; }
  .checkbox-row input { width: 15px; height: 15px; accent-color: var(--accent); }
  .file-list { flex: 1; overflow-y: auto; }
  .file-item { padding: 8px 10px 8px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; display: flex; align-items: center; gap: 10px; }
  .file-item:hover { background: var(--surface2); }
  .file-item.active { background: var(--accent-bg); }
  .file-item.processing { opacity: .6; }
  .file-item.error { background: var(--danger-bg); }
  .file-thumb { width: 36px; height: 36px; border-radius: 4px; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
  .file-info { min-width: 0; flex: 1; }
  .file-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .file-saved { font-size: 11px; font-weight: 600; white-space: nowrap; }
  .file-saved.positive { color: var(--success); }
  .file-saved.negative { color: var(--danger); }
  .file-remove { width: 22px; height: 22px; border: none; background: transparent; color: var(--text3); cursor: pointer; border-radius: 4px; font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center; flex-shrink: 0; opacity: 0; transition: opacity .15s, background .1s; }
  .file-item:hover .file-remove { opacity: 1; }
  .file-remove:hover { background: var(--danger-bg); color: var(--danger); }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .drop-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed var(--border); border-radius: var(--radius); margin: 20px; transition: all .15s; cursor: pointer; }
  .drop-zone.over { border-color: var(--accent); background: var(--accent-bg); }
  .drop-zone p:first-child { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .drop-zone p:last-child { font-size: 13px; color: var(--text3); }
  .preview-area { flex: 1; position: relative; overflow: hidden; background: var(--surface2); }
  .preview-toolbar { position: absolute; top: 12px; right: 12px; z-index: 10; display: flex; gap: 4px; background: var(--surface); border-radius: var(--radius-sm); padding: 3px; box-shadow: 0 2px 8px rgba(0,0,0,.12); border: 1px solid var(--border); }
  .preview-toolbar button { width: 30px; height: 30px; border: none; background: transparent; border-radius: 4px; cursor: pointer; font-size: 14px; color: var(--text2); display: flex; align-items: center; justify-content: center; }
  .preview-toolbar button:hover { background: var(--surface2); }
  .preview-toolbar button.active { background: var(--accent-bg); color: var(--accent); }
  .preview-toolbar .sep { width: 1px; background: var(--border); margin: 4px 2px; }
  .zoom-info { position: absolute; bottom: 12px; left: 12px; z-index: 10; font-size: 11px; color: var(--text3); background: var(--surface); padding: 4px 10px; border-radius: var(--radius-sm); box-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .compare-label { font-size: 10px; color: var(--text3); background: var(--surface); padding: 2px 8px; border-radius: 3px; pointer-events: none; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .checker-bg { background-image: linear-gradient(45deg,#d0d0d0 25%,transparent 25%),linear-gradient(-45deg,#d0d0d0 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#d0d0d0 75%),linear-gradient(-45deg,transparent 75%,#d0d0d0 75%); background-size:16px 16px; background-position:0 0,0 8px,8px -8px,-8px 0; }
  .canvas-wrap { position: absolute; transform-origin: 0 0; }
  .canvas-wrap img { display: block; }
  .compare-container { position: relative; }
  .compare-container img { position: absolute; top: 0; left: 0; display: block; }
  .slider-divider { position: absolute; top: 0; bottom: 0; width: 3px; background: var(--accent); z-index: 5; cursor: ew-resize; transform: translateX(-1px); }
  .slider-divider::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:24px; height:24px; background:var(--accent); border-radius:50%; box-shadow:0 2px 6px rgba(0,0,0,.2); }
  .slider-divider::before { content:'\25C0  \25B6'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-size:8px; z-index:1; white-space:nowrap; }
  .btn { padding: 6px 14px; font-size: 12px; font-weight: 500; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); transition: all .1s; }
  .btn:hover { background: var(--surface2); }
  .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-accent:hover { background: #2370cc; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .stats-bar { padding: 8px 16px; background: var(--surface); border-top: 1px solid var(--border); font-size: 12px; color: var(--text2); display: flex; gap: 20px; align-items: center; }
  .stats-bar strong { color: var(--text); font-weight: 600; }
  .summary-bar { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .summary-total { font-size: 20px; font-weight: 600; color: var(--success); line-height: 1.2; }
  .summary-detail { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .summary-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 6px; }
  .preset-btns { display: flex; gap: 3px; background: var(--surface2); border-radius: var(--radius-sm); padding: 2px; }
  .preset-btns button { flex: 1; padding: 4px 0; font-size: 11px; font-weight: 500; border: none; border-radius: 4px; background: transparent; color: var(--text2); cursor: pointer; transition: all .15s; }
  .preset-btns button.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .inline-inputs { display: flex; align-items: center; gap: 6px; }
  .input-pair { display: flex; align-items: center; gap: 4px; flex: 1; }
  .section-lbl { font-size: 11px; color: var(--text3); font-weight: 500; }
  .num-input { width: 100%; padding: 4px 6px; font-size: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text); outline: none; font-family: inherit; }
  .num-input:focus { border-color: var(--accent); }
  .input-x { color: var(--text3); font-size: 12px; }
  .anchor-grid { display: grid; grid-template-columns: repeat(3, 22px); gap: 3px; }
  .anchor-grid button { width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 3px; background: var(--surface2); cursor: pointer; transition: all .1s; padding: 0; }
  .anchor-grid button.active { background: var(--accent); border-color: var(--accent); }
  .anchor-grid button:hover { border-color: var(--accent); }
</style>
  <script type="module" crossorigin src="./assets/index-DSBPs8Yc.js"></script>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Image Tool</h1>
    <div class="header-actions">
      <button class="btn btn-sm" onclick="addFiles()">+ Add files</button>
      <div id="download-wrap" style="position:relative;display:none;">
        <button class="btn btn-sm btn-accent" onclick="showDownloadMenu()" id="download-all-btn">Download all &#9662;</button>
      </div>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple style="display:none">
  </div>
  <div class="sidebar">
    <div class="section-title">Settings</div>
    <div class="settings">
      <div class="setting-row">
        <label class="checkbox-row"><input type="checkbox" id="enable-resize"> Resize</label>
      </div>
      <div id="resize-settings" style="display:none">
        <div class="setting-row">
          <div class="preset-btns" id="resize-presets">
            <button data-pct="25">25%</button>
            <button data-pct="50">50%</button>
            <button data-pct="75">75%</button>
            <button data-pct="100" class="active">100%</button>
          </div>
        </div>
        <div class="setting-row">
          <div class="setting-label"><span>Scale</span><span id="resize-val">100%</span></div>
          <input type="range" id="resize-pct" min="1" max="100" step="1" value="100">
        </div>
      </div>

      <div class="setting-row">
        <label class="checkbox-row"><input type="checkbox" id="enable-canvas"> Extend canvas</label>
      </div>
      <div id="canvas-settings" style="display:none">
        <div class="setting-row inline-inputs">
          <div class="input-pair"><label class="section-lbl">W</label><input type="number" id="canvas-w" min="1" max="8192" value="0" class="num-input"></div>
          <span class="input-x">&times;</span>
          <div class="input-pair"><label class="section-lbl">H</label><input type="number" id="canvas-h" min="1" max="8192" value="0" class="num-input"></div>
        </div>
        <div class="setting-row">
          <div class="setting-label"><span>Anchor</span></div>
          <div class="anchor-grid" id="anchor-grid">
            <button data-a="tl" title="Top left"></button>
            <button data-a="tc" title="Top center"></button>
            <button data-a="tr" title="Top right"></button>
            <button data-a="ml" title="Middle left"></button>
            <button data-a="mc" class="active" title="Center"></button>
            <button data-a="mr" title="Middle right"></button>
            <button data-a="bl" title="Bottom left"></button>
            <button data-a="bc" title="Bottom center"></button>
            <button data-a="br" title="Bottom right"></button>
          </div>
        </div>
      </div>

      <div class="setting-row" style="margin-top:8px">
        <div class="setting-label"><span>Output format</span></div>
        <div class="format-btns" id="format-btns">
          <button data-fmt="png" class="active">PNG</button>
          <button data-fmt="jpeg">JPG</button>
          <button data-fmt="webp">WebP</button>
        </div>
      </div>
      <div class="setting-row"><label class="checkbox-row"><input type="checkbox" id="remove-black" checked> Remove black background</label></div>
      <div id="black-settings">
        <div class="setting-row"><div class="setting-label"><span>Threshold</span><span id="thresh-val">30</span></div><input type="range" id="threshold" min="0" max="128" step="1" value="30"></div>
        <div class="setting-row"><div class="setting-label"><span>Feather</span><span id="feather-val">10</span></div><input type="range" id="feather" min="0" max="64" step="1" value="10"></div>
      </div>
      <div id="png-settings">
        <div class="setting-row"><div class="setting-label"><span>Palette colors</span><span id="colors-val">256</span></div><input type="range" id="png-colors" min="2" max="256" step="2" value="256"></div>
        <label class="checkbox-row"><input type="checkbox" id="png-dither" checked> Floyd-Steinberg dithering</label>
      </div>
      <div id="jpeg-settings" style="display:none">
        <div class="setting-row"><div class="setting-label"><span>Quality</span><span id="jpeg-q-val">85</span></div><input type="range" id="jpeg-quality" min="1" max="100" step="1" value="85"></div>
        <label class="checkbox-row"><input type="checkbox" id="jpeg-mozjpeg" checked> mozjpeg optimization</label>
      </div>
      <div id="webp-settings" style="display:none">
        <label class="checkbox-row"><input type="checkbox" id="webp-lossless" checked> Lossless</label>
        <div class="setting-row" id="webp-q-row" style="display:none"><div class="setting-label"><span>Quality</span><span id="webp-q-val">82</span></div><input type="range" id="webp-quality" min="1" max="100" step="1" value="82"></div>
      </div>
    </div>
    <div class="section-title"><span>Files</span><span class="clear-all" id="clear-all-btn" style="display:none" onclick="clearAllFiles()">Clear all</span></div>
    <div class="file-list" id="file-list"></div>
    <div class="summary-bar" id="summary-bar" style="display:none"></div>
  </div>
  <div class="main" id="main-area">
    <div class="drop-zone" id="drop-zone"><p>Drop images here or click to browse</p><p>PNG, JPG, WebP, BMP, GIF</p></div>
  </div>
</div>
</body>
</html>
